{% extends 'base.html' %}

{% block title %}Movies - Cinemax Pro{% endblock %}

{% block content %}
<div class="header-flex">
    <h2>Now Showing</h2>
</div>

<div class="movie-grid">
    {% for movie in movies %}
    <div class="movie-card">
        <img src="{{ movie.poster }}" alt="{{ movie.title }}" class="movie-poster">
        <div class="movie-info">
            <h3 class="movie-title">{{ movie.title }}</h3>
            <div class="movie-meta">
                <span>{{ movie.genre }}</span>
                <span style="color: var(--neon-blue);">{{ movie.rating }}</span>
            </div>
            <a href="{{ url_for('shows.selection', movie_id=movie.id) }}" class="btn neon-btn-red book-btn">Book Now</a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
