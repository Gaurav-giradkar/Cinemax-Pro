{% extends 'base.html' %}

{% block title %}Login - Cinemax Pro{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card">
        <h2 class="auth-title">Welcome Back</h2>
        <form method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="form-control" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn neon-btn-blue" style="width: 100%; margin-top: 1rem; padding: 1rem;">Login</button>
        </form>
        <a href="{{ url_for('auth.signup') }}" class="auth-link">Don't have an account? Sign up</a>
    </div>
</div>
{% endblock %}
