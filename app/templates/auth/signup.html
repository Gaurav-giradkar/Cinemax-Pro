{% extends 'base.html' %}

{% block title %}Sign Up - Cinemax Pro{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card">
        <h2 class="auth-title">Create Account</h2>
        <form method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" name="mobile" id="mobile" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn neon-btn-red" style="width: 100%; margin-top: 1rem; padding: 1rem;">Sign Up</button>
        </form>
        <a href="{{ url_for('auth.login') }}" class="auth-link">Already have an account? Login</a>
    </div>
</div>
{% endblock %}
